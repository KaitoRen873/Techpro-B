        this.player = null;
        this.obstacles = [];
        this.orbs = [];
        this.score = 0;
        this.distance = 0;
        this.combo = 0;
        this.maxCombo = 0;
        this.multiplier = 1;
        this.orbsCollected = 0;
        this.speed = 20;
        this.baseSpeed = 20;
        this.maxSpeed = 60;
        this.spawnDistance = 0;
        this.difficulty = 1;
        this.playTime = 0;
        
        // Camera
        this.camera = {
            position: new Vec3(0, 5, 8),
            target: new Vec3(0, 2, -10),
            fov: Utils.degToRad(60)
        };
        
        this.projection = new Mat4();
        this.view = new Mat4();
        this.groundModel = new Mat4();
        
        // Post-processing settings
        this.postSettings = {
            bloomStrength: 0.8,
            vignetteStrength: 0.8,
            chromaticAberration: 0.5
        };
        
        // UI elements
        this.ui = {
            loading: document.getElementById('loadingScreen'),
            loadingProgress: document.getElementById('loadingProgressFill'),
            mainMenu: document.getElementById('mainMenu'),
            pauseMenu: document.getElementById('pauseMenu'),
            gameOverMenu: document.getElementById('gameOverMenu'),
            hud: document.getElementById('hud'),
            scoreDisplay: document.getElementById('scoreDisplay'),
            multiplierDisplay: document.getElementById('multiplierDisplay'),
            healthBar: document.getElementById('healthBar'),
            energyBar: document.getElementById('energyBar'),
            speedDisplay: document.getElementById('speedDisplay'),
            comboDisplay: document.getElementById('comboDisplay'),
            comboCount: document.getElementById('comboCount'),
            notifications: document.getElementById('notifications'),
            perfMonitor: document.getElementById('perfMonitor'),
            fpsDisplay: document.getElementById('fpsDisplay'),
            drawCallsDisplay: document.getElementById('drawCallsDisplay'),
            trianglesDisplay: document.getElementById('trianglesDisplay')
        };
        
        this.init();
    }
    
    async init() {
        try {
            // Initialize renderer
            this.updateLoadingProgress(10);
            this.renderer = new Renderer(this.canvas);
            
            // Initialize particles
            this.updateLoadingProgress(30);
            this.particles = new ParticleSystem(this.renderer, 5000);
            
            // Initialize storage
            this.updateLoadingProgress(50);
            await this.storage.init();
            
            // Initialize audio
            this.updateLoadingProgress(70);
            
            // Setup UI
            this.updateLoadingProgress(90);
            this.setupUI();
            
            // Handle resize
            window.addEventListener('resize', () => this.resize());
            this.resize();
            
            // Complete loading
            this.updateLoadingProgress(100);
            await this.delay(500);
            
            this.ui.loading.classList.add('hidden');
            this.state = 'menu';
            
            // Start game loop
            this.lastTime = performance.now();
            requestAnimationFrame(t => this.loop(t));
            
        } catch(error) {
            console.error('Failed to initialize game:', error);
            this.ui.loading.querySelector('.loading-text').textContent = 
                'Failed to initialize. WebGL2 required.';
        }
    }
    
    updateLoadingProgress(percent) {
        this.ui.loadingProgress.style.width = `${percent}%`;
    }
    
    delay(ms) {
        return new Promise(resolve => setTimeout(resolve, ms));
    }
    
    setupUI() {
        // Menu buttons
        document.getElementById('btnStart').addEventListener('click', () => this.startGame());
        document.getElementById('btnStats').addEventListener('click', () => this.showStats());
        document.getElementById('btnSettings').addEventListener('click', () => this.showSettings());
        document.getElementById('btnResume').addEventListener('click', () => this.resumeGame());
        document.getElementById('btnRestart').addEventListener('click', () => this.startGame());
        document.getElementById('btnQuit').addEventListener('click', () => this.quitToMenu());
        document.getElementById('btnPlayAgain').addEventListener('click', () => this.startGame());
        document.getElementById('btnBackToMenu').addEventListener('click', () => this.quitToMenu());
        
        // Debug: toggle performance monitor
        window.addEventListener('keydown', e => {
            if(e.code === 'F3') {
                this.ui.perfMonitor.classList.toggle('visible');
            }
        });
    }
    
    resize() {
        this.renderer.resize();
        this.projection.perspective(
            this.camera.fov,
            this.renderer.aspect,
            0.1,
            200
        );
    }
    
    startGame() {
        this.state = 'playing';
        
        // Initialize audio on user interaction
        this.audio.init().then(() => {
            this.audio.startMusic();
        });
        
        // Reset game state
        this.player = new Player();
        this.obstacles = [];
        this.orbs = [];
        this.score = 0;
        this.distance = 0;
        this.combo = 0;
        this.maxCombo = 0;
        this.multiplier = 1;
        this.orbsCollected = 0;
        this.speed = this.baseSpeed;
        this.spawnDistance = 30;
        this.difficulty = 1;
        this.playTime = 0;
        
        this.particles.clear();
        
        // Hide menus
        this.ui.mainMenu.classList.add('hidden');
        this.ui.pauseMenu.classList.add('hidden');
        this.ui.gameOverMenu.classList.add('hidden');
        
        this.updateHUD();
    }
    
    pauseGame() {
        if(this.state === 'playing') {
            this.state = 'paused';
            this.ui.pauseMenu.classList.remove('hidden');
        }
    }
    
    resumeGame() {
        if(this.state === 'paused') {
            this.state = 'playing';
            this.ui.pauseMenu.classList.add('hidden');
            this.audio.resume();
        }
    }
    
    async gameOver() {
        this.state = 'gameover';
        this.audio.stopMusic();
        this.audio.playGameOver();
        
        // Update stats
        const runStats = {
            score: this.score,
            distance: Math.floor(this.distance),
            maxCombo: this.maxCombo,
            orbs: this.orbsCollected,
            playTime: this.playTime
        };
        
        await this.storage.updateStats(runStats);
        
        // Show game over screen
        document.getElementById('finalScore').textContent = this.formatNumber(this.score);
        document.getElementById('finalDistance').textContent = `${Math.floor(this.distance)}m`;
        document.getElementById('maxCombo').textContent = this.maxCombo;
        document.getElementById('orbsCollected').textContent = this.orbsCollected;
        
        this.ui.gameOverMenu.classList.remove('hidden');
    }
    
    quitToMenu() {
        this.state = 'menu';
        this.audio.stopMusic();
        this.ui.pauseMenu.classList.add('hidden');
        this.ui.gameOverMenu.classList.add('hidden');
        this.ui.mainMenu.classList.remove('hidden');
    }
    
    async showStats() {
        const stats = await this.storage.getStats();
        alert(`
High Score: ${this.formatNumber(stats.highScore)}
Total Distance: ${Math.floor(stats.totalDistance)}m
Total Orbs: ${stats.totalOrbs}
Games Played: ${stats.gamesPlayed}
Max Combo: ${stats.maxCombo}
        `);
    }
    
    showSettings() {
        alert('Settings coming soon!');
    }
    
    loop(currentTime) {
        // Calculate delta time
        this.deltaTime = Math.min((currentTime - this.lastTime) / 1000, 0.1);
        this.lastTime = currentTime;
        this.time = currentTime / 1000;
        
        // FPS counter
        this.fpsFrames++;
        this.fpsTime += this.deltaTime;
        if(this.fpsTime >= 1) {
            this.fps = this.fpsFrames;
            this.fpsFrames = 0;
            this.fpsTime = 0;
        }
        
        // Update and render
        this.update();
        this.render();
        
        // Process input at end of frame
        this.input.update();
        
        requestAnimationFrame(t => this.loop(t));
    }
    
    update() {
        if(this.state !== 'playing') return;
        
        const dt = this.deltaTime;
        this.playTime += dt;
        
        // Check pause
        if(this.input.isDown('pause')) {
            this.pauseGame();
            return;
        }
        
        // Update player
        const playerAction = this.player.update(dt, this.input);
        if(playerAction === 'jump') {
            this.audio.playJump();
            this.spawnJumpParticles();
        }
        
        // Update speed and difficulty
        this.difficulty = 1 + this.distance / 500;
        this.speed = Math.min(this.maxSpeed, this.baseSpeed + this.difficulty * 3);
        
        // Update distance and score
        this.distance += this.speed * dt;
        this.score += Math.floor(this.speed * dt * this.multiplier);
        
        // Spawn obstacles and orbs
        this.spawnObjects();
        
        // Update obstacles
        for(const obstacle of this.obstacles) {
            obstacle.update(dt, this.speed);
        }
        this.obstacles = this.obstacles.filter(o => o.active);
        
        // Update orbs
        for(const orb of this.orbs) {
            orb.update(dt, this.speed, this.time);
        }
        this.orbs = this.orbs.filter(o => o.active && !o.collected);
        
        // Collision detection
        this.checkCollisions();
        
        // Update particles
        this.particles.update(dt);
        
        // Update camera
        this.updateCamera(dt);
        
        // Update audio intensity
        const intensity = (this.speed - this.baseSpeed) / (this.maxSpeed - this.baseSpeed);
        this.audio.updateMusic(intensity);
        
        // Combo decay
        if(this.combo > 0 && this.time - this.lastOrbTime > 2) {
            this.combo = 0;
            this.multiplier = 1;
        }
        
        // Update HUD
        this.updateHUD();
        
        // Check game over
        if(this.player.health <= 0) {
            this.gameOver();
        }
    }
    
    spawnObjects() {
        while(this.spawnDistance < this.distance + 100) {
            // Spawn pattern based on difficulty
            const pattern = this.generateSpawnPattern();
            
            for(const item of pattern) {
                if(item.type === 'obstacle') {
                    this.obstacles.push(new Obstacle(
                        item.lane,
                        this.spawnDistance - this.distance,
                        item.variant
                    ));
                } else if(item.type === 'orb') {
                    this.orbs.push(new Orb(
                        item.lane,
                        this.spawnDistance - this.distance,
                        item.variant
                    ));
                }
            }
            
            this.spawnDistance += Utils.random(8, 15) / Math.sqrt(this.difficulty);
        }
    }
    
    generateSpawnPattern() {
        const pattern = [];
        const rand = Math.random();
        
        // Obstacle patterns
        if(rand < 0.4) {
            // Single obstacle
            const lane = Utils.randomInt(-1, 1);
            const variant = Utils.randomChoice(['block', 'block', 'low', 'tall']);
            pattern.push({ type: 'obstacle', lane, variant });
            
            // Orb in adjacent lane
            const orbLane = lane === 0 ? Utils.randomChoice([-1, 1]) : (lane === 1 ? -1 : 1);
            pattern.push({ type: 'orb', lane: orbLane, variant: 'normal' });
            
        } else if(rand < 0.6) {
            // Double obstacle
            const openLane = Utils.randomInt(-1, 1);
            for(let l = -1; l <= 1; l++) {
                if(l !== openLane) {
                    pattern.push({ type: 'obstacle', lane: l, variant: 'block' });
                } else {
                    pattern.push({ type: 'orb', lane: l, variant: 'normal' });
                }
            }
            
        } else if(rand < 0.8) {
            // Orb line
            const lane = Utils.randomInt(-1, 1);
            const variant = Math.random() < 0.1 ? 'super' : 'normal';
            pattern.push({ type: 'orb', lane, variant });
            
        } else {
            // Health orb (rare)
            if(Math.random() < 0.2 && this.player && this.player.health < 80) {
                pattern.push({ type: 'orb', lane: Utils.randomInt(-1, 1), variant: 'health' });
            } else {
                pattern.push({ type: 'orb', lane: Utils.randomInt(-1, 1), variant: 'super' });
            }
        }
        
        return pattern;
    }
    
    checkCollisions() {
        const playerBox = this.player.getBoundingBox();
        
        // Check obstacle collisions
        for(const obstacle of this.obstacles) {
            if(!obstacle.active) continue;
            
            const obsBox = obstacle.getBoundingBox();
            if(this.boxIntersects(playerBox, obsBox)) {
                if(this.player.takeDamage(30)) {
                    this.audio.playHit();
                    this.input.vibrate(200, 0.8);
                    this.spawnHitParticles(obstacle.position);
                    this.combo = 0;
                    this.multiplier = 1;
                    this.showNotification('HIT!', '#ff3366');
                    
                    // Screen shake effect via post-processing
                    this.postSettings.chromaticAberration = 3;
                }
            }
        }
        
        // Check orb collisions
        for(const orb of this.orbs) {
            if(!orb.active || orb.collected) continue;
            
            const orbBox = orb.getBoundingBox();
            if(this.boxIntersects(playerBox, orbBox)) {
                orb.collected = true;
                this.collectOrb(orb);
            }
        }
    }
    
    boxIntersects(a, b) {
        return (
            a.min.x <= b.max.x && a.max.x >= b.min.x &&
            a.min.y <= b.max.y && a.max.y >= b.min.y &&
            a.min.z <= b.max.z && a.max.z >= b.min.z
        );
    }
    
    collectOrb(orb) {
        this.audio.playCollect();
        this.spawnCollectParticles(orb.position, orb.color);
        
        this.orbsCollected++;
        this.combo++;
        this.maxCombo = Math.max(this.maxCombo, this.combo);
        this.lastOrbTime = this.time;
        
        // Update multiplier
        if(this.combo >= 20) this.multiplier = 4;
        else if(this.combo >= 10) this.multiplier = 3;
        else if(this.combo >= 5) this.multiplier = 2;
        else this.multiplier = 1;
        
        if(orb.type === 'health') {
            this.player.health = Math.min(100, this.player.health + orb.healthRestore);
            this.showNotification('+HEALTH', '#00ff88');
        } else {
            this.score += orb.value * this.multiplier;
            
            if(orb.type === 'super') {
                this.showNotification(`+${orb.value * this.multiplier}`, '#ffaa00');
            }
        }
        
        // Combo milestones
        if(this.combo === 10) {
            this.showNotification('10 COMBO!', '#ff00aa');
            this.input.vibrate(100, 0.3);
        } else if(this.combo === 20) {
            this.showNotification('20 COMBO!', '#ff00aa');
            this.input.vibrate(150, 0.5);
        } else if(this.combo === 50) {
            this.showNotification('INCREDIBLE!', '#ff00aa');
            this.input.vibrate(200, 0.7);
        }
    }
    
    spawnJumpParticles() {
        this.particles.emit({
            position: this.player.position.clone(),
            count: 15,
            color: [0, 0.8, 1, 1],
            size: 8,
            speed: 3,
            spread: 2,
            lifetime: 0.5,
            gravity: -5,
            direction: new Vec3(0, -1, 0)
        });
    }
    
    spawnHitParticles(position) {
        this.particles.emit({
            position: position.clone(),
            count: 30,
            color: [1, 0.3, 0.2, 1],
            size: 12,
            speed: 10,
            spread: 3,
            lifetime: 0.8,
            gravity: -15
        });
    }
    
    spawnCollectParticles(position, color) {
        this.particles.emit({
            position: position.clone(),
            count: 20,
            color: [...color, 1],
            size: 10,
            speed: 5,
            spread: 2,
            lifetime: 0.6,
            gravity: 0
        });
    }
    
    updateCamera(dt) {
        // Dynamic camera based on speed
        const speedFactor = (this.speed - this.baseSpeed) / (this.maxSpeed - this.baseSpeed);
        
        const targetY = 4 + speedFactor * 2;
        const targetZ = 10 - speedFactor * 3;
        const targetFov = Utils.degToRad(60 + speedFactor * 15);
        
        this.camera.position.x = Utils.lerp(this.camera.position.x, this.player.position.x * 0.3, 3 * dt);
        this.camera.position.y = Utils.lerp(this.camera.position.y, targetY, 2 * dt);
        this.camera.position.z = Utils.lerp(this.camera.position.z, targetZ, 2 * dt);
        
        this.camera.target.x = Utils.lerp(this.camera.target.x, this.player.position.x * 0.5, 4 * dt);
        this.camera.target.y = Utils.lerp(this.camera.target.y, this.player.position.y, 3 * dt);
        
        this.camera.fov = Utils.lerp(this.camera.fov, targetFov, 2 * dt);
        
        // Update matrices
        this.projection.perspective(this.camera.fov, this.renderer.aspect, 0.1, 200);
        this.view.lookAt(this.camera.position, this.camera.target, new Vec3(0, 1, 0));
        
        // Decay screen shake
        this.postSettings.chromaticAberration = Utils.lerp(this.postSettings.chromaticAberration, 0.5, 5 * dt);
    }
    
    updateHUD() {
        this.ui.scoreDisplay.textContent = this.formatNumber(this.score);
        this.ui.multiplierDisplay.textContent = `×${this.multiplier}`;
        this.ui.speedDisplay.textContent = Math.floor(this.speed);
        this.ui.healthBar.style.width = `${this.player.health}%`;
        this.ui.healthBar.style.backgroundPosition = `${100 - this.player.health}% 0`;
        this.ui.energyBar.style.width = `${this.player.energy}%`;
        
        // Combo display
        if(this.combo > 2) {
            this.ui.comboDisplay.classList.add('active');
            this.ui.comboCount.textContent = this.combo;
        } else {
            this.ui.comboDisplay.classList.remove('active');
        }
        
        // Performance monitor
        this.ui.fpsDisplay.textContent = this.fps;
        this.ui.drawCallsDisplay.textContent = this.renderer.drawCalls;
        this.ui.trianglesDisplay.textContent = Math.floor(this.renderer.triangles);
    }
    
    showNotification(text, color = '#ffffff') {
        const notification = document.createElement('div');
        notification.className = 'notification';
        notification.textContent = text;
        notification.style.color = color;
        notification.style.textShadow = `0 0 20px ${color}`;
        this.ui.notifications.appendChild(notification);
        
        setTimeout(() => notification.remove(), 1500);
    }
    
    formatNumber(num) {
        if(num >= 1000000) return (num / 1000000).toFixed(1) + 'M';
        if(num >= 1000) return (num / 1000).toFixed(1) + 'K';
        return num.toString();
    }
    
    render() {
        const gl = this.renderer.gl;
        
        this.renderer.beginFrame();
        
        // Only render game objects when playing
        if(this.state === 'playing' || this.state === 'paused' || this.state === 'gameover') {
            // Render ground grid
            this.renderGround();
            
            // Render player
            this.renderPlayer();
            
            // Render obstacles
            this.renderObstacles();
            
            // Render orbs
            this.renderOrbs();
            
            // Render particles
            this.particles.render(this.projection, this.view, this.time);
        } else {
            // Menu background - animated grid only
            this.renderMenuBackground();
        }
        
        // Post-processing
        this.renderer.postProcess(this.time, this.postSettings);
    }
    
    renderGround() {
        const gl = this.renderer.gl;
        const program = this.renderer.programs.grid;
        
        gl.useProgram(program.program);
        
        this.groundModel.identity().translate(0, 0, -40);
        
        gl.uniformMatrix4fv(program.uniforms.uProjection, false, this.projection.data);
        gl.uniformMatrix4fv(program.uniforms.uView, false, this.view.data);
        gl.uniformMatrix4fv(program.uniforms.uModel, false, this.groundModel.data);
        gl.uniform1f(program.uniforms.uTime, this.time);
        gl.uniform1f(program.uniforms.uSpeed, this.speed);
        gl.uniform3f(program.uniforms.uColor1, 0.02, 0.02, 0.08);
        gl.uniform3f(program.uniforms.uColor2, 0, 0.6, 1);
        gl.uniform3f(program.uniforms.uFogColor, 0.02, 0.02, 0.05);
        
        gl.enable(gl.BLEND);
        gl.blendFunc(gl.SRC_ALPHA, gl.ONE_MINUS_SRC_ALPHA);
        
        this.renderer.draw(this.renderer.geometries.ground);
        
        gl.disable(gl.BLEND);
    }
    
    renderPlayer() {
        const gl = this.renderer.gl;
        const program = this.renderer.programs.main;
        
        gl.useProgram(program.program);
        
        gl.uniformMatrix4fv(program.uniforms.uProjection, false, this.projection.data);
        gl.uniformMatrix4fv(program.uniforms.uView, false, this.view.data);
        gl.uniformMatrix4fv(program.uniforms.uModel, false, this.player.model.data);
        gl.uniform3f(program.uniforms.uCameraPos, 
            this.camera.position.x, this.camera.position.y, this.camera.position.z);
        gl.uniform1f(program.uniforms.uTime, this.time);
        
        // Player color with invulnerability flash
        const flash = this.player.invulnerableTime > 0 && 
                      Math.sin(this.time * 20) > 0 ? 0.5 : 1;
        gl.uniform3f(program.uniforms.uBaseColor, 0 * flash, 0.8 * flash, 1 * flash);
        gl.uniform1f(program.uniforms.uEmissive, 0.3);
        gl.uniform3f(program.uniforms.uFogColor, 0.02, 0.02, 0.05);
        
        this.renderer.draw(this.renderer.geometries.cube);
    }
    
    renderObstacles() {
        const gl = this.renderer.gl;
        const program = this.renderer.programs.main;
        
        gl.useProgram(program.program);
        
        for(const obstacle of this.obstacles) {
            gl.uniformMatrix4fv(program.uniforms.uModel, false, obstacle.model.data);
            gl.uniform3f(program.uniforms.uBaseColor, ...obstacle.color);
            gl.uniform1f(program.uniforms.uEmissive, 0.1);
            
            this.renderer.draw(this.renderer.geometries.cube);
        }
    }
    
    renderOrbs() {
        const gl = this.renderer.gl;
        const program = this.renderer.programs.main;
        
        gl.useProgram(program.program);
        
        for(const orb of this.orbs) {
            if(orb.collected) continue;
            
            gl.uniformMatrix4fv(program.uniforms.uModel, false, orb.model.data);
            gl.uniform3f(program.uniforms.uBaseColor, ...orb.color);
            gl.uniform1f(program.uniforms.uEmissive, 0.8);
            
            this.renderer.draw(this.renderer.geometries.sphere);
        }
    }
    
    renderMenuBackground() {
        const gl = this.renderer.gl;
        const program = this.renderer.programs.grid;
        
        // Animated camera for menu
        const menuCam = new Mat4();
        const eye = new Vec3(
            Math.sin(this.time * 0.3) * 5,
            5 + Math.sin(this.time * 0.5) * 2,
            10
        );
        const target = new Vec3(0, 0, -20);
        menuCam.lookAt(eye, target, new Vec3(0, 1, 0));
        
        gl.useProgram(program.program);
        
        this.groundModel.identity().translate(0, 0, -40);
        
        gl.uniformMatrix4fv(program.uniforms.uProjection, false, this.projection.data);
        gl.uniformMatrix4fv(program.uniforms.uView, false, menuCam.data);
        gl.uniformMatrix4fv(program.uniforms.uModel, false, this.groundModel.data);
        gl.uniform1f(program.uniforms.uTime, this.time);
        gl.uniform1f(program.uniforms.uSpeed, 10);
        gl.uniform3f(program.uniforms.uColor1, 0.02, 0.02, 0.08);
        gl.uniform3f(program.uniforms.uColor2, 0, 0.4, 0.8);
        gl.uniform3f(program.uniforms.uFogColor, 0.02, 0.02, 0.05);
        
        gl.enable(gl.BLEND);
        gl.blendFunc(gl.SRC_ALPHA, gl.ONE_MINUS_SRC_ALPHA);
        
        this.renderer.draw(this.renderer.geometries.ground);
        
        gl.disable(gl.BLEND);
    }
}

// Initialize game when DOM is ready
document.addEventListener('DOMContentLoaded', () => {
    window.game = new VoidRunner();
});
    </script>
